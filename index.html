
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisaragi Match | Temukan Pasangan yang Sejalan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#ffe7f7,#f3e8ff,#dbeafe);padding:30px}
.container{max-width:900px;margin:auto}
.card{background:rgba(255,255,255,.85);border-radius:30px;padding:40px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
.header{text-align:center;margin-bottom:30px}
.logo{font-size:60px;margin-bottom:15px}
.profile-photo{
    text-align:center;
    margin-bottom:20px;
}

.profile-photo img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}  
h1{color:#9333ea}
p.desc{color:#6b7280;margin-top:10px;line-height:1.7}
.form-group{margin-bottom:18px}
label{display:block;font-weight:600;margin-bottom:8px}
input,select,textarea{width:100%;padding:14px;border:2px solid #e9d5ff;border-radius:14px}
textarea{resize:vertical}
button{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-weight:700;cursor:pointer}
.notice{background:#faf5ff;padding:15px;border-radius:15px;margin-bottom:20px}
.success{display:none;text-align:center;padding:30px}
.required{color:#ec4899}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="header">
<div class="logo">💜</div>

<div class="profile-photo">
    <img
        src="https://scontent.fpnh26-1.fna.fbcdn.net/v/t39.30808-6/451768145_26407747155505348_7690192099795800299_n.jpg"
        alt="Foto Profil">
  
</div>

<h1>Kisaragi Match</h1>
<p class="desc">Temukan pasangan yang memiliki nilai hidup, tujuan, dan kepribadian yang sejalan denganmu.</p>
</div>

<div id="formSection">
<div class="notice">Data hanya digunakan untuk proses pencocokan pasangan.</div>

<form id="matchForm">

<div class="form-group">
<label>Nama Lengkap <span class="required">*</span></label>
<input type="text" required>
</div>

<div class="form-group">
<label>Usia <span class="required">*</span></label>
<input type="number" required>
</div>

<div class="form-group">
<label>Domisili <span class="required">*</span></label>
<input type="text" required>
</div>

<div class="form-group">
<label>Tinggi Badan</label>
<input type="number">
</div>

<div class="form-group">
<label>Pendidikan Terakhir</label>
<select>
<option>SMA/SMK</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>
</div>

<div class="form-group">
<label>Pekerjaan</label>
<input type="text">
</div>

<div class="form-group">
<label>Tujuan Bergabung</label>
<select>
<option>Mencari pasangan serius</option>
<option>Menuju pernikahan</option>
<option>Mencari teman terlebih dahulu</option>
</select>
</div>

<div class="form-group">
<label>Hobi dan Minat</label>
<input type="text">
</div>

<div class="form-group">
<label>Ceritakan Tentang Dirimu</label>
<textarea rows="4"></textarea>
</div>

<div class="form-group">
<label>Love Language</label>
<select>
<option>Quality Time</option>
<option>Words of Affirmation</option>
<option>Acts of Service</option>
<option>Receiving Gifts</option>
<option>Physical Touch</option>
</select>
</div>

<div class="form-group">
<label>Apakah Merokok?</label>
<select>
<option>Tidak</option>
<option>Ya</option>
<option>Kadang-kadang</option>
</select>
</div>

<div class="form-group">
<label>Ingin Memiliki Anak?</label>
<select>
<option>Ya</option>
<option>Tidak</option>
<option>Belum Yakin</option>
</select>
</div>

<div class="form-group">
<label>Rentang Usia Pasangan yang Dicari</label>
<input type="text" placeholder="Contoh: 24-30 tahun">
</div>

<div class="form-group">
<label>Domisili Pasangan yang Diinginkan</label>
<input type="text">
</div>

<div class="form-group">
<label>Foto Profil</label>
<input type="file">
</div>

<button type="submit">💜 Kirim Profil</button>
</form>
</div>

<div class="success" id="successSection">
<h2>Profil Berhasil Dikirim</h2>
<p>Terima kasih telah bergabung dengan Kisaragi Match.</p>
</div>

</div>
</div>

<script>
document.getElementById('matchForm').addEventListener('submit',function(e){
e.preventDefault();
document.getElementById('formSection').style.display='none';
document.getElementById('successSection').style.display='block';
});
</script>
</body>
</html>
